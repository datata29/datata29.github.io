<svg width="100%" viewBox="0 0 680 345" role="img" style="" xmlns="http://www.w3.org/2000/svg"><title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">DAU 감소의 드릴다운 분해</title><desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">DAU가 50,000에서 40,000으로 1만명 감소했을 때, 이를 신규·복귀·기존 유저 유형으로 분해하고, 가장 큰 감소를 보인 신규 유저를 다시 저레벨·고레벨로 분해하는 드릴다운 예시. 감소가 신규·저레벨 유저에 집중되어 있음을 보여준다.</desc>
